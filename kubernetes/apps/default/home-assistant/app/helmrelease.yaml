---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: home-assistant
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: home-assistant
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      home-assistant:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/home-operations/home-assistant
              tag: 2026.3.3@sha256:16c50c92379b507ef0de98ea5371f2a0cabf917991d9f7d1c52f612c5557388a
            env:
              TZ: America/New_York
              HASS_HTTP_TRUSTED_PROXY_1: 192.168.42.0/24
              HASS_HTTP_TRUSTED_PROXY_2: 10.69.0.0/16
              HOME_ASSISTANT__HACS_INSTALL: true
            envFrom:
              - secretRef:
                  name: home-assistant-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 2Gi
          # code-server:
          #   image:
          #     repository: ghcr.io/coder/code-server
          #     tag: 4.109.5@sha256:f9ccfeb5a3de80d16342a6a842519c481522d80aafe65fb24a16393235a34f71
          #   args: [
          #     "--auth", "none",
          #     "--user-data-dir", "/config/.vscode",
          #     "--extensions-dir", "/config/.vscode",
          #     "--port", "12321",
          #     "/config"
          #   ]
          #   resources:
          #     requests:
          #       cpu: 10m
          #     limits:
          #       memory: 512Mi
    defaultPodOptions:
      annotations:
        k8s.v1.cni.cncf.io/networks: |-
          [{
            "name": "multus-iot",
            "namespace": "network",
            "ips": ["10.0.1.10/24"]
          }]
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            appProtocol: kubernetes.io/ws
            port: 8123
    route:
      app:
        hostnames: ["hass.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
      # code-server:
      #   hostnames: ["hass-code.${SECRET_DOMAIN}"]
      #   parentRefs:
      #     - name: envoy-internal
      #       namespace: network
      #   rules:
      #     - backendRefs:
      #         - name: app
      #           port: 12321
    persistence:
      config:
        existingClaim: home-assistant
        globalMounts:
          - path: /config
      config-cache:
        existingClaim: home-assistant-cache
        globalMounts:
          - path: /config/.venv
      logs:
        type: emptyDir
        globalMounts:
          - path: /config/logs
      tts:
        type: emptyDir
        globalMounts:
          - path: /config/tts
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
      # mcdashboard:
      #   existingClaim: mcdashboard-data
      #   globalMounts:
      #     - path: mcdashboard
      # zigbee:
      #   existingClaim: zigbee-config
      #   globalMounts:
      #     - path: /zigbee
      # bifrost:
      #   existingClaim: bifrost-persistence
      #   globalMounts:
      #     - path: /bifrost

