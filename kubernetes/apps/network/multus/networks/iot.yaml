---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/k8s.cni.cncf.io/networkattachmentdefinition_v1.json
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: multus-iot
spec:
  config: |-
    {
      "cniVersion": "1.1.0",
      "name": "multus-iot",
      "plugins": [
        {
          "type": "macvlan",
          "master": "bond0.2",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "ipam": {
              "type": "static",
              "subnet": "10.0.1.0/24",
              "gateway": "10.0.1.1"
            }
          }
        },
        {
          "type": "sbr"
        }
      ]
    }