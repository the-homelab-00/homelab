---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://10.0.0.55:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "10.0.0.55"
additionalMachineCertSans: *sans

clusterPodNets: ["10.69.0.0/16"]
clusterSvcNets: ["10.96.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "home-lab-1"
    ipAddress: "10.0.0.10"
    installDisk: "/dev/sda"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/714c82d7736b918256b9c4d2415c9473786328facfa4205d4f7ef77e48020081
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "d8:bb:c1:0a:6e:7a"
        dhcp: false
        vlans:
          - vlanId: 2
          - vlanId: 3
        addresses:
          - "10.0.0.10/24"
        routes:
          - gateway: "10.0.0.1"
            network: 0.0.0.0/0
        mtu: 1500
        vip:
          ip: "10.0.0.55"
    patches:
      - # Load kernel modules
        |-
        machine:
          kernel:
            modules:
              - name: nvidia
              - name: nvidia_uvm
              - name: nvidia_drm
              - name: nvidia_modeset
              - name: dm_thin_pool
              - name: dm_mod

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

